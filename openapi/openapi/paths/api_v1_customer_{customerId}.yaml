parameters:
  - name: customerId
    in: path
    description: "ID of the customer to operate on"
    required: true
    schema:
      type: integer
      format: int32
get:
  tags:
    - Customer
  summary: Get a customer by ID
  description: "Returns a single customer identified by its ID."
  operationId: getCustomerById
  security:
    - api_key: []
  responses:
    '200':
      description: "Successfully retrieved the customer"
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Customer.yaml'
          example:
            id: 1
            version: 0
            createdDate: "2023-01-01T12:00:00Z"
            updateDate: "2023-01-01T12:00:00Z"
            name: "John Doe"
            email: "john.doe@example.com"
            phoneNumber: "555-1234"
            addressLine1: "123 Main St"
            city: "Anytown"
            state: "NY"
            postalCode: "12345"
    '401':
      description: "Unauthorized"
    '404':
      description: "Customer not found"
put:
  tags:
    - Customer
  summary: Update a customer
  description: "Updates an existing customer identified by its ID. The ID in the path must match the ID in the request body."
  operationId: updateCustomer
  security:
    - api_key: []
  requestBody:
    description: "Updated customer object"
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/Customer.yaml'
        example:
          id: 1
          name: "John Updated"
          email: "john.updated@example.com"
          addressLine1: "123 Main St"
          city: "Anytown"
          state: "NY"
          postalCode: "12345"
  responses:
    '200':
      description: "Successfully updated the customer"
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Customer.yaml'
          example:
            id: 1
            version: 1
            createdDate: "2023-01-01T12:00:00Z"
            updateDate: "2023-01-04T09:30:00Z"
            name: "John Updated"
            email: "john.updated@example.com"
            addressLine1: "123 Main St"
            city: "Anytown"
            state: "NY"
            postalCode: "12345"
    '400':
      description: "Bad request - validation error"
    '401':
      description: "Unauthorized"
    '404':
      description: "Customer not found"
delete:
  tags:
    - Customer
  summary: Delete a customer
  description: "Deletes a customer identified by its ID."
  operationId: deleteCustomer
  security:
    - api_key: []
  responses:
    '204':
      description: "Successfully deleted the customer"
    '401':
      description: "Unauthorized"
    '404':
      description: "Customer not found"
