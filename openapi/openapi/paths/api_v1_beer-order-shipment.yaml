get:
  tags:
    - BeerOrderShipment
  summary: Get all beer order shipments
  description: "Returns a list of all beer order shipments in the system."
  operationId: getAllShipments
  security:
    - api_key: []
  responses:
    '200':
      description: "Successfully retrieved the list of shipments"
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/BeerOrderShipment.yaml'
    '400':
      description: "Bad request"
post:
  tags:
    - BeerOrderShipment
  summary: Create a new beer order shipment
  description: "Creates a new shipment record for a beer order."
  operationId: createShipment
  security:
    - api_key: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/BeerOrderShipment.yaml'
  responses:
    '201':
      description: "Successfully created a new shipment"
      content:
        application/json:
          schema:
            $ref: '../components/schemas/BeerOrderShipment.yaml'
    '400':
      description: "Bad request - validation error"
