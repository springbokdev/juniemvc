get:
  tags:
    - Customer
  summary: Get all customers
  description: "Returns a list of all customers in the system."
  operationId: getAllCustomers
  security:
    - api_key: []
  responses:
    '200':
      description: "Successfully retrieved the list of customers"
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/Customer.yaml'
          example:
            - id: 1
              version: 0
              createdDate: "2023-01-01T12:00:00Z"
              updateDate: "2023-01-01T12:00:00Z"
              name: "John Doe"
              email: "john.doe@example.com"
              phoneNumber: "555-1234"
              addressLine1: "123 Main St"
              city: "Anytown"
              state: "NY"
              postalCode: "12345"
    '401':
      description: "Unauthorized"
post:
  tags:
    - Customer
  summary: Create a new customer
  description: "Creates a new customer in the system. The ID, version, createdDate, and updateDate fields will be ignored if provided."
  operationId: createCustomer
  security:
    - api_key: []
  requestBody:
    description: "Customer object to be created"
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/Customer.yaml'
        example:
          name: "Jane Smith"
          email: "jane.smith@example.com"
          addressLine1: "456 Oak Ave"
          city: "Othertown"
          state: "CA"
          postalCode: "67890"
  responses:
    '201':
      description: "Successfully created a new customer"
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Customer.yaml'
          example:
            id: 2
            version: 0
            createdDate: "2023-01-03T15:00:00Z"
            updateDate: "2023-01-03T15:00:00Z"
            name: "Jane Smith"
            email: "jane.smith@example.com"
            addressLine1: "456 Oak Ave"
            city: "Othertown"
            state: "CA"
            postalCode: "67890"
    '400':
      description: "Bad request - validation error"
    '401':
      description: "Unauthorized"
